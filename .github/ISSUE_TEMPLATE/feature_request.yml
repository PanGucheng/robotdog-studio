name: 功能建议
description: 提出上位机、教学体验、AI、硬件联调或固件工作流建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: goal
    attributes:
      label: 想解决什么问题
      description: 请描述使用场景和目标用户。
      placeholder: 例如：学生不知道下一步该点击哪里……
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 如果你已经有想法，可以写在这里。
  - type: dropdown
    id: area
    attributes:
      label: 涉及范围
      options:
        - 上位机 UI
        - AI 修改闭环
        - 手动代码编辑
        - 固件构建
        - WCH-Link 烧录
        - 蓝牙串口
        - 板载串口/IAP
        - 教学文档
        - 其他
    validations:
      required: true
